title: Dika

enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

outputs:
  home: [html]
  section: [html, rss]

taxonomies:
  tag: tags

menu:
  main:
    - name: Showcase
      pageRef: /showcase
      weight: 1
      params:
        icon: collection
        type: link

    - name: Blog
      pageRef: /blog
      weight: 2

    - name: Docs
      pageRef: /docs
      weight: 3

    - name: About
      pageRef: /about
      weight: 4

    - name: GitHub
      url: "https://github.com/imfing/hextra-starter-template"
      weight: 5
      params:
        icon: github

    - name: Search
      weight: 6
      params:
        type: search

params:
  toc:
    displayTags: true
  navbar:
    displayTitle: true
    displayLogo: true

    logo:
      path: images/logo.png
      dark: images/logo-dark.png

  footer:
    displayCopyright: false
    displayPoweredBy: true

  # 🔥 TAMBAHAN PENTING
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 10
    article:
      displayPagination: true
  
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: full

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"