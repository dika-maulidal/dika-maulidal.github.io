title: Ðika

enableGitInfo: true

module:
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

# PENTING: Menambahkan markdown agar fitur "Copy as Markdown" berfungsi
outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

taxonomies:
  tag: tags

menu:
  main:
    - name: Showcase
      pageRef: /showcase
      weight: 1
      params:
        icon: collection
        type: link

    - name: Blog
      pageRef: /blog
      weight: 2

    - name: Notes
      pageRef: /notes
      weight: 3

    - name: About
      pageRef: /about
      weight: 4

    - name: GitHub
      url: "https://github.com/dika-maulidal"
      weight: 5
      params:
        icon: github

    - name: Search
      weight: 6
      params:
        type: search

params:
  toc:
    displayTags: true
  navbar:
    displayTitle: true
    displayLogo: true

    logo:
      path: /logo.png
      dark: /logo-dark.png

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true
    width: normal

  # 🔥 TAMBAHAN PENTING
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Konfigurasi agar menu "Copy Page" muncul
  page:
    width: normal
    contextMenu:
      enable: true
      links:
        - name: Open in ChatGPT
          icon: chatgpt
          url: "https://chatgpt.com/?hints=search&q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."
        - name: Open in Claude
          icon: claude
          url: "https://claude.ai/new?q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 10
    article:
      displayPagination: true
  
  search:
    enable: true
    type: flexsearch

    flexsearch:
      index: content
      tokenize: full

  editURL:
    enable: true
    base: "https://github.com/dika-maulidal/dika-maulidal.github.io/edit/main/content"